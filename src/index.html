<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Gerador DIGEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --surface: rgba(25, 28, 35, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --primary: #9d4edd;
            --primary-hover: #7b2cbf;
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
            --success: #2d6a4f;
            --warning: #b7b7a4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top left, #240046, #0f1115 60%);
            overflow: hidden; /* Stop whole body scroll so tab height is stable */
        }

        /* Top Bar */
        .top-bar {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid var(--surface-border);
            backdrop-filter: blur(10px);
            gap: 20px;
            flex-shrink: 0;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 10px 15px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: none;
            width: auto;
        }

        .tab-btn.active {
            background: rgba(157, 78, 221, 0.2);
            color: var(--text-main);
            border: 1px solid rgba(157, 78, 221, 0.4);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.05);
            color: white;
            transform: translateY(0); /* remove global button hover transform for tabs */
            box-shadow: none;
        }

        /* Main Content Container */
        .content-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .content-area.hidden {
            display: none;
        }

        h1 {
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #e0aaff, #9d4edd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            align-self: center; /* Center panels horizontally if big monitor */
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--surface-border);
            color: white;
            padding: 12px;
            resize: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-stop {
            background: rgba(255, 77, 79, 0.2);
            color: #ff4d4f;
            border: 1px solid #ff4d4f;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-stop:hover {
            background: #ff4d4f;
            color: white;
            box-shadow: 0 0 10px rgba(255, 77, 79, 0.4);
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: #ddd;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-clear:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: #777;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--surface-border);
        }

        .mode-selector label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            color: white;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(157, 78, 221, 0.5);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--surface-border);
            padding-bottom: 8px;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .task-list::-webkit-scrollbar { width: 6px; }
        .task-list::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        .task-item {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .task-item.running {
            border-color: #f77f00;
            box-shadow: 0 0 10px rgba(247, 127, 0, 0.2);
        }

        .task-item.completed { border-color: var(--success); }

        .task-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .task-prompt {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #333;
            text-transform: uppercase;
            font-weight: 800;
        }
        
        .status-badge.queued { background: #5c677d; }
        .status-badge.running { background: #f77f00; color: #fff;}
        .status-badge.completed { background: var(--success); color: #fff;}

        .loader {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 5px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="top-bar">
        <button class="tab-btn active" id="tabPanel">⚙️ Painel de Filas</button>
        <button class="tab-btn" id="tabDigen">🌐 Navegador DIGEN</button>
    </div>

    <!-- MAIN PANEL -->
    <div class="content-area" id="panelArea">
        <h1>⚡ DM Gerador DIGEN</h1>

        <div class="glass-panel">
            <div class="mode-selector">
                <label><input type="radio" name="genMode" value="video" checked> 🎥 Gerar Vídeo</label>
                <label><input type="radio" name="genMode" value="image"> 🖼️ Gerar Imagem</label>
            </div>
            <div class="form-group">
                <label for="promptInput">Novo Prompt</label>
                <textarea id="promptInput" placeholder="Descreva o que você deseja criar..."></textarea>
            </div>
            <button class="action-btn" id="queueBtn">Enfileirar Prompt</button>
        </div>

        <div class="glass-panel">
            <div class="queue-header">
                <h3>Fila de Execução</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-clear" id="clearBtn">🗑️ Limpar Fila</button>
                    <button class="btn-stop" id="stopBtn">⏹ Parar Tudo</button>
                </div>
            </div>
            <div class="task-list" id="taskList">
                <!-- Tasks will appear here -->
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
